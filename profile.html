<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fristo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>

</head>
<body>
  
    <header>
        <nav>
            <h1 >fristo</h1>
            
                <button class="location" type="submit" onclick="getDetails()"  > <i class="fa-solid fa-search"></i><span>location</span> </button>
                <button class="location" type="submit"><input type="text" placeholder="search"></button>
                <ul>
                <li><a href="home1.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a href=""><i class="fa-solid fa-heart"></i></a></li>
                <li><a href=""><i class="fa-solid fa-bell"></i></a> </li>
                <li><a href=""><i class="fa-solid fa-globe"></i></a></li>
                
                <li><button  onclick="col()"><i class="fa-solid fa-lightbulb"></i></button></li>
            </ul>
            <ul>
                <li><button  ><a href="profile.html"><i class="fa-solid fa-circle-user"></i></a></button></li>
            </ul>
        </nav>  
    </header>
    
<center>
    <h1>My Profile</h1>
    <p>Manage your profile. </p>
    <div id="profile">

        <div id="profile-container1">        
            <div class="wishlist">
                <div class="d"> 
                <i class="fa-solid fa-heart" ></i> 
                </div>
                <div class="d">                            
                <h2>My Wishlist </h2>
                <strong>Manage your wishlist</strong>
                </div>
            </div>    
            <div class="profile-info">
                <img src="https://via.placeholder.com/150" alt="Profile Picture">
                <br>
                <h2>Profile Information</h2>
                <br>
                <p>Name : <span id="name"></span></p>            
                <br>
                <p>Email : <span id="email"></span></p>
            </div>
        </div>

        <div id="profile-container2">
            <div class="language setting">
                <i class="fa-solid fa-language"></i>
                <div class="d">
                    <h2>Language Settings</h2>
                    <strong>Select Your Prefered Language</strong>
                </div>
            </div>        
            <div class="app-preference">
                <i class="fa-solid fa-mobile"></i>
                <div class="d">
                <h2>Application Preferences</h2>
                <strong>Device specific settings</strong>
                </div>
                <div class="push-notification">
                    <span>Push Notifiction</span>
                    <label class="switch">
                        <input type="checkbox" id="push-toggle">
                        <span class="slider"></span>
                    </label>    
                </div>
                <p id="app-preference-info">Notification: off</p>
            </div>
            <div>               
                <button  class="logout" type="button" onclick="logout()">
                    Logout
                </button>                    
            </div>
                
            <div>
            <button class="delete-account" type="button" onclick="deleteAccount()">
                Delete Account
            </button>
            </div>
        </div>
        
    </div>
</center>
</body>
<script>
    function logout() {

        localStorage.removeItem("loggedInUser");
        window.location.href = "login.html";
        
    }
</script>
<script>
    const pushToggle = document.getElementById('push-toggle');
    const appPreferenceInfo = document.getElementById('app-preference-info');

    pushToggle.addEventListener('change', function() {
        if (this.checked) {
            appPreferenceInfo.textContent = 'Notification: on';
        } else {
            appPreferenceInfo.textContent = 'Notification: off';
        }
    });
</script>
<script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));

    if (user) {

        document.getElementById("name").textContent = user.name;
        document.getElementById("email").textContent = user.email;

    } else {

        alert("Please Login First");
        window.location.href = "login.html";

    }
</script>
<script>
    function deleteAccount() {

    let customers = JSON.parse(localStorage.getItem("customers")) || [];

    const user = JSON.parse(localStorage.getItem("loggedInUser"));

    customers = customers.filter(c => c.email !== user.email);

    localStorage.setItem("customers", JSON.stringify(customers));

    localStorage.removeItem("loggedInUser");

    alert("Account Deleted");

    window.location.href = "signup.html";
}
</script>
</html>
